<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>株主管理アプリ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:#f5f5f0;color:#1a1a18;font-size:14px;line-height:1.6;}
.page{display:none;}.page.active{display:block;}
.container{max-width:900px;margin:0 auto;padding:0 1.25rem;}
.btn{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:500;padding:7px 14px;background:#fff;border:0.5px solid #ccc;border-radius:8px;cursor:pointer;color:#1a1a18;transition:background .12s;}
.btn:hover{background:#f0efea;}
.btn-primary{background:#1a1a18;color:#fff;border:none;}
.btn-primary:hover{background:#333;}
.btn-danger{background:#fbeaea;color:#b83232;border-color:#f09595;}
.btn-danger:hover{background:#f7c1c1;}
.btn-sm{padding:4px 10px;font-size:12px;}
.card{background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px;}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;color:#666;margin-bottom:5px;display:block;}
.form-input{width:100%;padding:8px 10px;font-size:13px;border:0.5px solid #ccc;border-radius:8px;background:#fff;color:#1a1a18;}
.form-input:focus{outline:none;border-color:#888;}
select.form-input{appearance:auto;}
textarea.form-input{resize:vertical;}
.tbl{width:100%;font-size:13px;border-collapse:collapse;}
.tbl th{font-size:11px;font-weight:500;color:#888;text-align:left;padding:0 8px 10px 0;border-bottom:0.5px solid #e0dfd8;letter-spacing:.03em;}
.tbl td{padding:11px 8px 11px 0;border-bottom:0.5px solid #e0dfd8;color:#1a1a18;}
.tbl tr:last-child td{border-bottom:none;}
.tbl tr.clickable{cursor:pointer;transition:background .1s;}
.tbl tr.clickable:hover td{background:#f8f8f4;}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;font-weight:500;}
.badge-receive{background:#EAF3DE;color:#27500A;}
.badge-vote{background:#FAEEDA;color:#633806;}
.badge-benefit{background:#E1F5EE;color:#085041;}
.badge-event{background:#EEEDFE;color:#3C3489;}
.back-btn{display:inline-flex;align-items:center;gap:5px;font-size:13px;color:#888;cursor:pointer;padding:4px 0;background:none;border:none;}
.back-btn:hover{color:#1a1a18;}
.search-wrap{position:relative;margin-bottom:1rem;}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#aaa;pointer-events:none;}
.search-wrap input{padding-left:32px;}
.event-item{border:0.5px solid #e0dfd8;border-radius:8px;padding:12px 14px;margin-bottom:8px;background:#fff;}
.event-header{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.event-date{font-size:12px;color:#888;}
.modal-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto;}
.modal-backdrop.open{display:flex;}
.modal{background:#fff;border-radius:12px;border:0.5px solid #ccc;padding:1.5rem;width:100%;max-width:480px;margin:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:1.25rem;}
.modal-actions{display:flex;gap:8px;margin-top:1.25rem;}
.login-page{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f5f5f0;}
.login-box{background:#fff;border:0.5px solid #e0dfd8;border-radius:16px;padding:3rem 2.5rem;text-align:center;max-width:380px;width:100%;margin:1rem;}
.checkbox-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:13px;}
.photo-preview{width:80px;height:80px;object-fit:cover;border-radius:8px;border:0.5px solid #e0dfd8;margin-top:8px;display:block;}
.empty{text-align:center;padding:3rem;color:#aaa;font-size:13px;}
.catalog-box{margin-top:8px;padding:12px;background:#f5f5f0;border-radius:8px;}
.top-bar{background:#fff;border-bottom:0.5px solid #e0dfd8;padding:0.8rem 0;position:sticky;top:0;z-index:50;}
.top-bar-inner{display:flex;align-items:center;justify-content:space-between;}
.main-content{padding:1.5rem 0;}
</style>
</head>
<body>

<!-- ログイン -->
<div id="page-login" class="page active">
  <div class="login-page">
    <div class="login-box">
      <div style="font-size:28px;font-weight:500;margin-bottom:8px;">株主管理</div>
      <div style="font-size:14px;color:#888;margin-bottom:2rem;line-height:1.7;">保有株式の郵便物・優待・議決権を<br>まとめて管理するアプリです</div>
      <button class="btn" onclick="signInWithGoogle()" style="width:100%;justify-content:center;gap:10px;padding:12px 20px;font-size:14px;">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Googleでログイン
      </button>
      <div id="login-error" style="font-size:12px;color:#b83232;margin-top:12px;display:none;"></div>
    </div>
  </div>
</div>

<!-- 銘柄一覧 -->
<div id="page-main" class="page">
  <div class="top-bar">
    <div class="container top-bar-inner">
      <div style="font-size:15px;font-weight:500;">株主管理</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="btn btn-sm" onclick="document.getElementById('csv-input').click()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          CSVインポート
        </button>
        <input type="file" id="csv-input" accept=".csv" style="display:none" onchange="importCSV(this)">
        <button class="btn btn-sm btn-primary" onclick="openStockModal()">+ 銘柄追加</button>
        <button class="btn btn-sm" onclick="signOut()" style="color:#888;">ログアウト</button>
      </div>
    </div>
  </div>
  <div class="container main-content">
    <div class="search-wrap">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input class="form-input" id="search-input" placeholder="証券コード・銘柄名で検索" oninput="renderStocks()">
    </div>
    <div class="card" style="padding:0;overflow:hidden;">
      <table class="tbl">
        <thead><tr>
          <th style="padding:12px 8px 10px 1.25rem;">コード</th>
          <th>銘柄名</th>
          <th style="text-align:right;">保有株数</th>
          <th style="text-align:right;padding-right:1.25rem;">取得単価</th>
        </tr></thead>
        <tbody id="stocks-tbody"></tbody>
      </table>
      <div id="stocks-empty" class="empty" style="display:none;">銘柄を追加してください</div>
    </div>
  </div>
</div>

<!-- 詳細ページ -->
<div id="page-detail" class="page">
  <div class="top-bar">
    <div class="container top-bar-inner">
      <button class="back-btn" onclick="showMain()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        一覧に戻る
      </button>
      <button class="btn btn-sm btn-primary" onclick="openEventModal()">+ イベント追加</button>
    </div>
  </div>
  <div class="container main-content">
    <div style="margin-bottom:1.5rem;">
      <div style="font-size:20px;font-weight:500;" id="d-name"></div>
      <div style="font-size:12px;color:#888;margin-top:4px;" id="d-sub"></div>
    </div>
    <div id="events-list"></div>
    <div id="events-empty" class="empty" style="display:none;">イベントがまだありません。「+ イベント追加」で記録してください。</div>
  </div>
</div>

<!-- 銘柄追加モーダル -->
<div class="modal-backdrop" id="stock-modal">
  <div class="modal">
    <div class="modal-title" id="stock-modal-title">銘柄を追加</div>
    <div class="form-group"><label class="form-label">証券コード *</label><input class="form-input" id="s-code" placeholder="例: 7203"></div>
    <div class="form-group"><label class="form-label">銘柄名 *</label><input class="form-input" id="s-name" placeholder="例: トヨタ自動車"></div>
    <div class="form-group"><label class="form-label">保有株数</label><input class="form-input" id="s-shares" type="number" placeholder="100"></div>
    <div class="form-group"><label class="form-label">取得単価（円）</label><input class="form-input" id="s-cost" type="number" placeholder="2500"></div>
    <div class="modal-actions">
      <button class="btn" style="flex:1" onclick="closeStockModal()">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveStock()">保存</button>
    </div>
  </div>
</div>

<!-- イベント追加モーダル -->
<div class="modal-backdrop" id="event-modal">
  <div class="modal">
    <div class="modal-title">イベントを追加</div>
    <div class="form-group">
      <label class="form-label">種類</label>
      <select class="form-input" id="e-type" onchange="updateEventFields()">
        <option value="receive">受取記録（郵便・メール）</option>
        <option value="vote">議決権・株主総会</option>
        <option value="benefit">株主優待</option>
        <option value="event">株主イベント</option>
      </select>
    </div>
    <div class="form-group"><label class="form-label">日付</label><input class="form-input" id="e-date" type="date"></div>

    <!-- 受取記録フィールド -->
    <div id="ef-receive">
      <div class="form-group">
        <label class="form-label">受取方法</label>
        <select class="form-input" id="e-method">
          <option value="郵便">郵便</option>
          <option value="メール">メール</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">種別</label>
        <select class="form-input" id="e-category">
          <option value="株主総会通知">株主総会通知</option>
          <option value="議決権行使書">議決権行使書</option>
          <option value="業績報告書">業績報告書</option>
          <option value="配当金振込通知">配当金振込通知</option>
          <option value="優待・金券">優待・金券</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">コメント</label><textarea class="form-input" id="e-comment-r" rows="2" placeholder="内容・金額などメモ"></textarea></div>
    </div>

    <!-- 議決権・総会フィールド -->
    <div id="ef-vote" style="display:none;">
      <div class="form-group">
        <label class="form-label">方法</label>
        <select class="form-input" id="e-vote-method" onchange="updateVoteFields()">
          <option value="Web行使">Web行使</option>
          <option value="はがき発送">はがき発送</option>
          <option value="総会出席">総会出席</option>
        </select>
      </div>
      <div id="ef-vote-place" style="display:none;">
        <div class="form-group"><label class="form-label">場所</label><input class="form-input" id="e-vote-place" placeholder="例: 東京国際フォーラム"></div>
        <div class="form-group">
          <label class="form-label">出欠結果</label>
          <select class="form-input" id="e-vote-result">
            <option value="出席">出席</option>
            <option value="欠席">欠席</option>
          </select>
        </div>
      </div>
      <div class="form-group"><label class="form-label">コメント</label><textarea class="form-input" id="e-comment-v" rows="2" placeholder="メモ"></textarea></div>
    </div>

    <!-- 株主優待フィールド -->
    <div id="ef-benefit" style="display:none;">
      <div class="form-group"><label class="form-label">優待内容</label><input class="form-input" id="e-benefit-content" placeholder="例: QUOカード500円分"></div>
      <div class="form-group"><label class="form-label">コメント</label><textarea class="form-input" id="e-comment-b" rows="2" placeholder="金額・使用状況などメモ"></textarea></div>
      <div class="checkbox-row">
        <input type="checkbox" id="e-is-catalog" onchange="toggleCatalog()">
        <label for="e-is-catalog">カタログギフト</label>
      </div>
      <div id="ef-catalog" class="catalog-box" style="display:none;">
        <div class="form-group"><label class="form-label">申込内容</label><input class="form-input" id="e-catalog-content" placeholder="例: コシヒカリ5kg"></div>
        <div class="form-group"><label class="form-label">申込期限</label><input class="form-input" id="e-catalog-deadline" type="date"></div>
        <div class="checkbox-row"><input type="checkbox" id="e-catalog-applied"><label for="e-catalog-applied">申込済み</label></div>
        <div class="checkbox-row"><input type="checkbox" id="e-catalog-arrived"><label for="e-catalog-arrived">届いた</label></div>
      </div>
      <div class="form-group" style="margin-top:10px;"><label class="form-label">写真</label><input type="file" class="form-input" id="e-benefit-photo" accept="image/*"></div>
    </div>

    <!-- 株主イベントフィールド -->
    <div id="ef-event" style="display:none;">
      <div class="form-group"><label class="form-label">場所</label><input class="form-input" id="e-event-place" placeholder="例: 本社工場"></div>
      <div class="form-group"><label class="form-label">内容</label><input class="form-input" id="e-event-content" placeholder="例: 工場見学"></div>
      <div class="form-group"><label class="form-label">感想</label><textarea class="form-input" id="e-event-impression" rows="3" placeholder="参加した感想など"></textarea></div>
      <div class="form-group"><label class="form-label">写真</label><input type="file" class="form-input" id="e-event-photo" accept="image/*"></div>
    </div>

    <div class="modal-actions">
      <button class="btn" style="flex:1" onclick="closeEventModal()">キャンセル</button>
      <button class="btn btn-primary" style="flex:1" onclick="saveEvent()">保存</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://ndbwijlautdtthljkuzf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_Lf28B6u9gswaVX-Eg7htsA_57N6-_Z2';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let stocks = [];
let currentStock = null;
let editingStock = null;

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) { currentUser = session.user; showMain(); loadStocks(); }
  else showPage('page-login');

  sb.auth.onAuthStateChange((_e, session) => {
    if (session) { currentUser = session.user; showMain(); loadStocks(); }
    else { currentUser = null; showPage('page-login'); }
  });
}

async function signInWithGoogle() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: "https://tombaba.github.io/shareholder-app/" }
  });
  if (error) {
    const el = document.getElementById('login-error');
    el.style.display = 'block';
    el.textContent = 'ログインに失敗しました: ' + error.message;
  }
}

async function signOut() {
  await sb.auth.signOut();
  stocks = []; currentStock = null; currentUser = null;
}

function showPage(id) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showMain() { showPage('page-main'); }

async function loadStocks() {
  const { data } = await sb.from('shareholder_stocks')
    .select('*').eq('user_id', currentUser.id).order('code');
  stocks = data || [];
  renderStocks();
}

function renderStocks() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = stocks.filter(s =>
    s.code.toLowerCase().includes(q) || s.name.toLowerCase().includes(q)
  );
  const tbody = document.getElementById('stocks-tbody');
  tbody.innerHTML = '';
  document.getElementById('stocks-empty').style.display = filtered.length ? 'none' : 'block';
  filtered.forEach(s => {
    const tr = document.createElement('tr');
    tr.className = 'clickable';
    tr.onclick = () => showDetail(s);
    tr.innerHTML = `
      <td style="padding-left:1.25rem;font-weight:500;">${s.code}</td>
      <td>${s.name}</td>
      <td style="text-align:right;">${s.shares ? Number(s.shares).toLocaleString() + '株' : '-'}</td>
      <td style="text-align:right;padding-right:1.25rem;">${s.cost_price ? '¥' + Number(s.cost_price).toLocaleString() : '-'}</td>
    `;
    tbody.appendChild(tr);
  });
}

function openStockModal(stock) {
  editingStock = stock || null;
  document.getElementById('stock-modal-title').textContent = stock ? '銘柄を編集' : '銘柄を追加';
  document.getElementById('s-code').value = stock ? stock.code : '';
  document.getElementById('s-name').value = stock ? stock.name : '';
  document.getElementById('s-shares').value = stock ? stock.shares : '';
  document.getElementById('s-cost').value = stock ? stock.cost_price : '';
  document.getElementById('stock-modal').classList.add('open');
}

function closeStockModal() { document.getElementById('stock-modal').classList.remove('open'); }

async function saveStock() {
  const code = document.getElementById('s-code').value.trim();
  const name = document.getElementById('s-name').value.trim();
  const shares = parseFloat(document.getElementById('s-shares').value) || null;
  const cost_price = parseFloat(document.getElementById('s-cost').value) || null;
  if (!code || !name) { alert('証券コードと銘柄名は必須です'); return; }
  if (editingStock) {
    await sb.from('shareholder_stocks').update({ code, name, shares, cost_price }).eq('id', editingStock.id);
  } else {
    await sb.from('shareholder_stocks').insert({ code, name, shares, cost_price, user_id: currentUser.id });
  }
  closeStockModal();
  loadStocks();
}

async function showDetail(stock) {
  currentStock = stock;
  document.getElementById('d-name').textContent = stock.name;
  document.getElementById('d-sub').textContent =
    `証券コード: ${stock.code}　保有: ${stock.shares ? Number(stock.shares).toLocaleString() + '株' : '-'}　取得単価: ${stock.cost_price ? '¥' + Number(stock.cost_price).toLocaleString() : '-'}`;
  showPage('page-detail');
  loadEvents();
}

async function loadEvents() {
  const { data } = await sb.from('shareholder_events')
    .select('*').eq('stock_id', currentStock.id).order('date', { ascending: false });
  renderEvents(data || []);
}

const TYPE_LABEL = { receive:'受取記録', vote:'議決権・総会', benefit:'株主優待', event:'株主イベント' };
const TYPE_BADGE = { receive:'badge-receive', vote:'badge-vote', benefit:'badge-benefit', event:'badge-event' };

function renderEvents(events) {
  const list = document.getElementById('events-list');
  list.innerHTML = '';
  document.getElementById('events-empty').style.display = events.length ? 'none' : 'block';

  events.forEach(ev => {
    const div = document.createElement('div');
    div.className = 'event-item';
    let detail = '';
    if (ev.type === 'receive') {
      detail = `<div style="font-size:13px;margin-bottom:2px;">${ev.method || ''} / <strong>${ev.category || ''}</strong></div>`;
    } else if (ev.type === 'vote') {
      detail = `<div style="font-size:13px;margin-bottom:2px;"><strong>${ev.method || ''}</strong>${ev.content ? ' — ' + ev.content : ''}</div>`;
    } else if (ev.type === 'benefit') {
      detail = `<div style="font-size:13px;margin-bottom:2px;"><strong>${ev.content || ''}</strong></div>`;
      if (ev.deadline) {
        const daysLeft = Math.ceil((new Date(ev.deadline) - new Date()) / 86400000);
        const warn = daysLeft <= 30 && daysLeft >= 0;
        detail += `<span style="font-size:12px;color:${warn ? '#854F0B' : '#888'};background:${warn ? '#FAEEDA' : 'transparent'};padding:${warn ? '1px 6px' : '0'};border-radius:4px;">申込期限: ${ev.deadline}${warn ? '（残り' + daysLeft + '日）' : ''}</span> `;
      }
      if (ev.applied) detail += `<span class="badge" style="background:#EAF3DE;color:#27500A;margin-left:4px;">申込済</span>`;
      if (ev.arrived) detail += `<span class="badge" style="background:#e8f0fb;color:#0C447C;margin-left:4px;">届いた</span>`;
    } else if (ev.type === 'event') {
      detail = `<div style="font-size:13px;margin-bottom:2px;"><strong>${ev.content || ''}</strong>${ev.method ? ' @ ' + ev.method : ''}</div>`;
    }

    div.innerHTML = `
      <div class="event-header">
        <span class="badge ${TYPE_BADGE[ev.type]}">${TYPE_LABEL[ev.type]}</span>
        <span class="event-date">${ev.date || ''}</span>
        <button class="btn btn-sm btn-danger" style="margin-left:auto;" onclick="deleteEvent('${ev.id}')">削除</button>
      </div>
      ${detail}
      ${ev.comment ? `<div style="font-size:12px;color:#888;margin-top:4px;">${ev.comment}</div>` : ''}
      ${ev.photo_url ? `<img src="${ev.photo_url}" class="photo-preview">` : ''}
    `;
    list.appendChild(div);
  });
}

function openEventModal() {
  document.getElementById('e-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('e-type').value = 'receive';
  document.getElementById('e-is-catalog').checked = false;
  document.getElementById('ef-catalog').style.display = 'none';
  ['e-comment-r','e-comment-v','e-comment-b','e-event-impression'].forEach(id => document.getElementById(id).value = '');
  ['e-benefit-content','e-event-content','e-event-place','e-vote-place','e-catalog-content'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('e-catalog-deadline').value = '';
  document.getElementById('e-catalog-applied').checked = false;
  document.getElementById('e-catalog-arrived').checked = false;
  updateEventFields();
  document.getElementById('event-modal').classList.add('open');
}

function closeEventModal() { document.getElementById('event-modal').classList.remove('open'); }

function updateEventFields() {
  const t = document.getElementById('e-type').value;
  ['receive','vote','benefit','event'].forEach(k => {
    document.getElementById('ef-' + k).style.display = k === t ? 'block' : 'none';
  });
}

function updateVoteFields() {
  const v = document.getElementById('e-vote-method').value;
  document.getElementById('ef-vote-place').style.display = v === '総会出席' ? 'block' : 'none';
}

function toggleCatalog() {
  document.getElementById('ef-catalog').style.display =
    document.getElementById('e-is-catalog').checked ? 'block' : 'none';
}

async function uploadPhoto(file) {
  const ext = file.name.split('.').pop();
  const path = `${currentUser.id}/${Date.now()}.${ext}`;
  const { error } = await sb.storage.from('shareholder-photos').upload(path, file);
  if (error) return null;
  return sb.storage.from('shareholder-photos').getPublicUrl(path).data.publicUrl;
}

async function saveEvent() {
  const type = document.getElementById('e-type').value;
  const date = document.getElementById('e-date').value;
  if (!date) { alert('日付を入力してください'); return; }

  const payload = { type, date, stock_id: currentStock.id, user_id: currentUser.id };

  if (type === 'receive') {
    payload.method = document.getElementById('e-method').value;
    payload.category = document.getElementById('e-category').value;
    payload.comment = document.getElementById('e-comment-r').value;
  } else if (type === 'vote') {
    payload.method = document.getElementById('e-vote-method').value;
    if (payload.method === '総会出席') {
      const place = document.getElementById('e-vote-place').value;
      const result = document.getElementById('e-vote-result').value;
      payload.content = [place, result].filter(Boolean).join(' / ');
    }
    payload.comment = document.getElementById('e-comment-v').value;
  } else if (type === 'benefit') {
    payload.content = document.getElementById('e-benefit-content').value;
    payload.comment = document.getElementById('e-comment-b').value;
    if (document.getElementById('e-is-catalog').checked) {
      payload.deadline = document.getElementById('e-catalog-deadline').value || null;
      payload.applied = document.getElementById('e-catalog-applied').checked;
      payload.arrived = document.getElementById('e-catalog-arrived').checked;
      const cc = document.getElementById('e-catalog-content').value;
      if (cc) payload.content = (payload.content ? payload.content + ' / ' : '') + cc;
    }
    const f = document.getElementById('e-benefit-photo').files[0];
    if (f) payload.photo_url = await uploadPhoto(f);
  } else if (type === 'event') {
    payload.content = document.getElementById('e-event-content').value;
    payload.method = document.getElementById('e-event-place').value;
    payload.comment = document.getElementById('e-event-impression').value;
    const f = document.getElementById('e-event-photo').files[0];
    if (f) payload.photo_url = await uploadPhoto(f);
  }

  const { error } = await sb.from('shareholder_events').insert(payload);
  if (error) { alert('保存に失敗しました: ' + error.message); return; }
  closeEventModal();
  loadEvents();
}

async function deleteEvent(id) {
  if (!confirm('このイベントを削除しますか？')) return;
  await sb.from('shareholder_events').delete().eq('id', id);
  loadEvents();
}

async function importCSV(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    const lines = e.target.result.trim().split('\n');
    const toInsert = [];
    for (let i = 1; i < lines.length; i++) {
      const cols = lines[i].split(',').map(c => c.replace(/^"|"$/g, '').trim());
      if (cols.length < 8 || cols[0] !== '国内株式') continue;
      toInsert.push({
        user_id: currentUser.id,
        code: cols[1],
        name: cols[2].replace(/[Ａ-Ｚａ-ｚ０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0)),
        shares: parseFloat((cols[4] || '').replace(/,/g, '')) || null,
        cost_price: parseFloat((cols[6] || '').replace(/,/g, '')) || null,
      });
    }
    if (!toInsert.length) { alert('国内株式データが見つかりませんでした'); return; }
    const { error } = await sb.from('shareholder_stocks')
      .upsert(toInsert, { onConflict: 'user_id,code', ignoreDuplicates: false });
    if (error) { alert('インポートに失敗しました: ' + error.message); return; }
    alert(`${toInsert.length}件インポートしました`);
    input.value = '';
    loadStocks();
  };
  reader.readAsText(file, 'UTF-8');
}

init();
</script>
